<!DOCTYPE html>
<html>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Control - ZogueKidd</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
  <script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
  <script>
// 1. CONECTAR LAS CONDICIONES DINÁMICAS DEL PANEL
fetch('/datos/condiciones.json')
  .then(res => res.json())
  .then(data => {
    if (data) {
      // Actualiza el precio base
      document.querySelector('.cond-price').innerHTML = `${data.precio_video} <span>/ Videoclip</span>`;
      
      // Actualiza los bloques de texto del modal
      const blocks = document.querySelectorAll('.conditions-scroll .cond-block');
      if (blocks.length >= 6) {
        blocks[1].querySelector('p').innerHTML = data.texto_rodaje;
        blocks[2].querySelector('p').innerHTML = data.texto_edicion;
        blocks[3].querySelector('p').innerHTML = data.texto_entrega;
        blocks[4].querySelector('p').innerHTML = data.texto_desplazamientos;
        blocks[5].querySelector('p').innerHTML = data.texto_reservas;
      }
    }
  }).catch(err => console.log("Usando datos locales hasta que el cliente publique en el panel"));

// 2. CONECTAR LOS VÍDEOS DINÁMICOS DEL PANEL
fetch('/datos/videos.json')
  .then(res => res.json())
  .then(data => {
    if (data && data.trabajos) {
      const grid = document.querySelector('.work-grid');
      grid.innerHTML = ''; // Borra los vídeos fijos viejos para poner los nuevos
      
      data.trabajos.forEach(trabajo => {
        const item = document.createElement('div');
        item.className = 'work-item reveal visible'; 
        item.setAttribute('data-video', trabajo.youtube_id);
        item.innerHTML = `
          <img class="work-thumb" src="https://img.youtube.com/vi/${trabajo.youtube_id}/maxresdefault.jpg" alt="${trabajo.titulo}" loading="lazy">
          <div class="work-overlay"></div>
          <div class="work-play"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>
          <div class="work-info">
            <div class="work-client">${trabajo.categoria}</div>
            <div class="work-title">${trabajo.titulo}</div>
            <div class="work-director">${trabajo.director}</div>
          </div>
        `;
        
        // Vincula el clic para que se abra el reproductor de YouTube
        item.addEventListener('click', () => openVideo(trabajo.youtube_id));
        
        // Mantiene el efecto del cursor personalizado en los nuevos vídeos
        if (typeof cursor !== 'undefined') {
          item.addEventListener('mouseenter', () => cursor.classList.add('expanded'));
          item.addEventListener('mouseleave', () => cursor.classList.remove('expanded'));
        }
        
        grid.appendChild(item);
      });
    }
  }).catch(err => console.log("Usando vídeos locales hasta que el cliente publique en el panel"));
</script>
</html>
