backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "ajustes"
    label: "Ajustes y Tarifas"
    files:
      - label: "Condiciones de Trabajo"
        name: "condiciones"
        file: "datos/condiciones.json"
        fields:
          - {label: "Precio Videoclip", name: "precio_video", widget: "number"}
          - {label: "Precio Hora Extra", name: "precio_hora", widget: "number"}
